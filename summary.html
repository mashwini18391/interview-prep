<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View your multi-round interview session results with AI-powered insights.">
  <title>Session Summary — InterviewAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/summary.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c5cfc'/><text x='16' y='23' text-anchor='middle' fill='white' font-size='18' font-weight='bold'>AI</text></svg>">
</head>
<body>
  <div class="animated-bg"></div>
  <div class="page-wrapper">
    <div id="navbar-container"></div>
    <main class="page-content">
      <div class="container" style="max-width:900px;">
        <!-- Loading -->
        <div id="loading-state">
          <div class="summary-header"><div class="skeleton skeleton-text lg" style="margin:0 auto;height:2em;max-width:300px;"></div></div>
          <div style="display:flex;justify-content:center;margin-bottom:var(--space-8);"><div class="skeleton skeleton-circle" style="width:160px;height:160px;"></div></div>
          <div class="grid grid-3"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
        </div>

        <!-- Content (hidden until loaded) -->
        <div id="summary-content" class="hidden">
          <div class="summary-header animate-fade-in-up">
            <h1>Session <span class="text-gradient">Summary</span></h1>
            <p id="summary-subtitle"></p>
          </div>

          <!-- Overall Score -->
          <div class="summary-score-section animate-fade-in-up stagger-2">
            <div id="score-circle"></div>
            <div class="summary-score-label" id="score-label"></div>
            <div class="summary-meta" id="summary-meta"></div>
          </div>

          <!-- Round Performance -->
          <div class="round-performance animate-fade-in-up stagger-3" id="round-performance"></div>

          <!-- Stats -->
          <div class="summary-stats">
            <div class="card summary-stat-card animate-fade-in-up stagger-3">
              <div class="stat-num" id="stat-answered" style="color:var(--primary-400);">0</div>
              <div class="stat-desc">Questions Answered</div>
            </div>
            <div class="card summary-stat-card animate-fade-in-up stagger-4">
              <div class="stat-num" id="stat-highest" style="color:var(--success-400);">0</div>
              <div class="stat-desc">Highest Score</div>
            </div>
            <div class="card summary-stat-card animate-fade-in-up stagger-5">
              <div class="stat-num" id="stat-lowest" style="color:var(--danger-400);">0</div>
              <div class="stat-desc">Lowest Score</div>
            </div>
          </div>

          <!-- Analysis -->
          <div class="analysis-grid">
            <div class="card analysis-card animate-fade-in-up stagger-4">
              <div class="analysis-title strengths">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Strengths
              </div>
              <p id="strengths-text">-</p>
            </div>
            <div class="card analysis-card animate-fade-in-up stagger-5">
              <div class="analysis-title improvements">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h.01"/><path d="M7 20v-4"/><path d="M12 20v-8"/><path d="M17 20V8"/><path d="M22 4v16"/></svg>
                Areas to Improve
              </div>
              <p id="improvements-text">-</p>
            </div>
          </div>

          <!-- Round Score Chart -->
          <div class="card animate-fade-in-up stagger-5" style="margin-bottom:var(--space-8);" id="round-chart-section">
            <div class="card-title" style="margin-bottom:var(--space-4);">Performance by Round</div>
            <div class="round-chart-container">
              <canvas id="round-chart"></canvas>
            </div>
          </div>

          <!-- Score Distribution Chart -->
          <div class="card animate-fade-in-up stagger-5" style="margin-bottom:var(--space-8);">
            <div class="card-title" style="margin-bottom:var(--space-4);">Score Distribution</div>
            <div class="score-chart-container">
              <canvas id="score-chart"></canvas>
            </div>
          </div>

          <!-- Learning Resources -->
          <div class="learning-resources animate-fade-in-up" id="learning-resources"></div>

          <!-- Question Breakdown -->
          <div class="breakdown-title animate-fade-in-up">Question Breakdown</div>
          <div class="breakdown-list" id="breakdown-list"></div>

          <!-- Actions -->
          <div class="summary-actions animate-fade-in-up">
            <a href="/setup.html" class="btn btn-primary btn-lg">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
              Try Again
            </a>
            <a href="/dashboard.html" class="btn btn-secondary btn-lg">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
              Dashboard
            </a>
            <button class="btn btn-ghost btn-lg" onclick="shareResults()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share Results
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js" defer></script>

  <script type="module">
    import { initSummary } from './js/summary.js';
    initSummary();
  </script>
</body>
</html>
